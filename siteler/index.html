<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BİK Pro 💧</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --pink: #ff6b81; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #ffebef; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 380px; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255,107,129,0.15); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: var(--pink); margin: 0 0 10px 0; font-size: 32px; letter-spacing: -1px; }
        .glass { width: 100px; height: 140px; border: 5px solid #333; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; margin: 20px auto; position: relative; overflow: hidden; background: #fff; }
        .water { position: absolute; bottom: 0; width: 100%; height: 0%; background: var(--blue); transition: height 1s ease; }
        .water::after { content: ""; position: absolute; top: -10px; left: -50%; width: 200%; height: 20px; background: rgba(255,255,255,0.3); border-radius: 40%; animation: wave 3s infinite linear; }
        @keyframes wave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--pink); color: white; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-blue { background: var(--blue); }
        .cookie-box { background: #fff3cd; border: 2px dashed #f39c12; padding: 20px; border-radius: 20px; cursor: pointer; }
        #status { font-weight: bold; color: #555; }
        #goalMsg { color: #27ae60; font-weight: bold; display: none; margin-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>BİK Pro 💧</h1>
        <div id="goalMsg">HEDEF TAMAMLANDI! 🎉</div>
        <div id="status">Bugün: 0 / 2000 ml</div>
        <div class="glass"><div id="water" class="water"></div></div>
        <input type="number" id="goal" placeholder="Hedef (ml)" value="2000">
        <input type="number" id="mins" placeholder="Kaç dakikada bir?">
        <button onclick="setupReminder()">Hatırlatıcıyı Başlat</button>
        <div class="grid">
            <button class="btn-blue" onclick="drink(150)">+150ml</button>
            <button class="btn-blue" onclick="drink(200)">+200ml</button>
            <button class="btn-blue" onclick="drink(300)">+300ml</button>
            <button class="btn-blue" onclick="drink(500)">+500ml</button>
        </div>
        <button onclick="resetData()" style="background:#bbb; margin-top:15px; padding:8px; font-size:12px;">Sıfırla</button>
    </div>
    <div class="card cookie-box" onclick="getFortune()">
        <strong>🥠 Şans Kurabiyesi</strong>
        <div id="fortuneText" style="margin-top:10px; font-style:italic;">Kurabiyeni kır...</div>
    </div>

    <script>
        let drank = parseInt(localStorage.getItem('drank')) || 0;
        const fortunes = ["Bugün şansın dönecek!", "Su içmek seni güzelleştirir.", "Güzel bir haber kapıda.", "İrem seni çok seviyor!", "Bugün enerjin tavan!", "Küçük bir sürpriz seni bekliyor.", "Sen bir starsın, parla!"];

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=' + Date.now()); 
        }

        function updateUI() {
            const target = document.getElementById('goal').value || 2000;
            const percent = Math.min((drank / target) * 100, 100);
            document.getElementById('water').style.height = percent + "%";
            document.getElementById('status').innerText = `Bugün: ${drank} / ${target} ml`;
            if(drank >= target) document.getElementById('goalMsg').style.display = "block";
        }

        function drink(ml) { drank += ml; localStorage.setItem('drank', drank); updateUI(); }

        async function setupReminder() {
            const m = document.getElementById('mins').value;
            if(!m) return alert("Dakika gir!");
            const perm = await Notification.requestPermission();
            if(perm === 'granted') {
                const reg = await navigator.serviceWorker.ready;
                reg.active.postMessage({ type: 'START_TIMER', interval: m * 60000 });
                new Notification("BİK Pro", { body: "Bildirimler aktif! Su içme vaktiii!" });
            }
        }

        function getFortune() { document.getElementById('fortuneText').innerText = fortunes[Math.floor(Math.random() * fortunes.length)]; }
        function resetData() { if(confirm("Sıfırlansın mı?")) { drank=0; localStorage.setItem('drank',0); updateUI(); } }
        updateUI();
    </script>
</body>
</html>
